<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Buddy Pro | AIO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #020617; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-green { box-shadow: 0 0 30px rgba(34, 197, 94, 0.5); border-color: #22c55e; }
        .glow-red { box-shadow: 0 0 30px rgba(239, 68, 68, 0.5); border-color: #ef4444; }
        .mic-active { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md glass rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden text-center">
        <header class="mb-10">
            <h1 class="text-slate-400 text-xs font-bold uppercase tracking-[0.3em] mb-2">Smart Education 2026</h1>
            <div class="text-3xl font-black text-white">AI BUDDY <span class="text-blue-500">PRO</span></div>
        </header>

        <div id="mainDisplay" class="bg-slate-900/50 rounded-3xl p-10 text-center border border-slate-700/50 mb-8 transition-all duration-500">
            <div id="statusText" class="text-blue-400 text-sm font-bold mb-4 uppercase tracking-tighter">System Offline</div>
            <div id="wordDisplay" class="text-6xl font-black text-white tracking-tighter opacity-20">READY</div>
            <div id="liveFeedback" class="text-[10px] text-slate-500 mt-2 h-4 overflow-hidden"></div>
        </div>

        <button id="btnConnect" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-blue-900/20 active:scale-95 flex items-center justify-center gap-3">
            PAIR WITH JDY-33
        </button>

        <div id="micContainer" class="hidden flex flex-col items-center mt-6">
            <div id="micCircle" class="w-16 h-16 bg-red-500 rounded-full flex items-center justify-center mic-active mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m8 0h-8m4-14a3 3 0 00-3 3v5a3 3 0 006 0V5a3 3 0 00-3-3z" />
                </svg>
            </div>
            <span class="text-red-500 text-xs font-bold uppercase tracking-widest mb-4">Listening...</span>
            <button id="btnAbort" class="text-slate-500 text-[10px] underline uppercase tracking-widest hover:text-white">Cancel / Force Stop</button>
        </div>
    </div>

    <script>
        const SERVICE_UUID = '0000ffe0-0000-1000-8000-00805f9b34fb';
        const CHAR_UUID = '0000ffe1-0000-1000-8000-00805f9b34fb';
        
        let btChar;
        const words = ["APPLE", "BANANA", "ORANGE", "CHERRY", "COMPUTER"];
        let currentIndex = 0;
        let isListening = false;
        let failsafeTimer = null;
        let finalTriggered = false;

        const btnConnect = document.getElementById('btnConnect');
        const statusText = document.getElementById('statusText');
        const wordDisplay = document.getElementById('wordDisplay');
        const micContainer = document.getElementById('micContainer');
        const mainDisplay = document.getElementById('mainDisplay');
        const btnAbort = document.getElementById('btnAbort');
        const liveFeedback = document.getElementById('liveFeedback');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            statusText.innerText = "Browser not supported";
            btnConnect.disabled = true;
        }
        
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = false; // False is often more stable for single words
        recognition.interimResults = true; 
        recognition.maxAlternatives = 1;

        btnConnect.onclick = async () => {
            try {
                statusText.innerText = "Scanning...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'JDY' }],
                    optionalServices: [SERVICE_UUID]
                });
                
                statusText.innerText = "Connecting...";
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                btChar = await service.getCharacteristic(CHAR_UUID);

                await btChar.startNotifications();
                btChar.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value).trim();
                    if(val.includes("NEXT")) startRound();
                });

                statusText.innerText = "Connected";
                btnConnect.classList.add('hidden');
                wordDisplay.classList.remove('opacity-20');
                speak("Ready. Press next on your arduino.");
            } catch (err) {
                statusText.innerText = "Error: " + err.message;
            }
        };

        btnAbort.onclick = () => {
            recognition.abort();
            handleNoMatch("Reset by User");
        };

        function startRound() {
            // Clean up state
            finalTriggered = false;
            isListening = false;
            if (failsafeTimer) clearTimeout(failsafeTimer);
            try { recognition.abort(); } catch(e) {} // Ensure mic is totally released

            const target = words[currentIndex];
            currentIndex = (currentIndex + 1) % words.length;
            wordDisplay.innerText = target;
            liveFeedback.innerText = "";
            mainDisplay.classList.remove('glow-green', 'glow-red');
            
            statusText.innerText = "Listen...";
            speak("The word is " + target);
            
            // Send Yellow command
            sendToArduino("L"); 

            // Wait for text-to-speech to finish before opening mic
            setTimeout(() => {
                try {
                    isListening = true;
                    micContainer.classList.remove('hidden');
                    statusText.innerText = "Listening...";
                    recognition.start();

                    // Failsafe timer
                    failsafeTimer = setTimeout(() => {
                        if (isListening) {
                            console.log("Failsafe: Auto-stopping due to silence.");
                            recognition.stop();
                        }
                    }, 12000); // 12 second window

                } catch(e) {
                    console.error("Mic start failed", e);
                    isListening = false;
                    micContainer.classList.add('hidden');
                }
            }, 2000);
        }

        recognition.onresult = (event) => {
            if (finalTriggered) return;

            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                interimTranscript += event.results[i][0].transcript.toUpperCase();
            }

            liveFeedback.innerText = "I heard: " + interimTranscript;
            
            if (interimTranscript.includes(wordDisplay.innerText)) {
                finalTriggered = true;
                success();
            }
        };

        function success() {
            isListening = false;
            if (failsafeTimer) clearTimeout(failsafeTimer);
            recognition.stop();
            
            micContainer.classList.add('hidden');
            sendToArduino("X"); 
            sendToArduino("G"); 

            statusText.innerText = "Perfect!";
            mainDisplay.classList.add('glow-green');
            speak("Excellent!");
        }

        function handleNoMatch(reason) {
            isListening = false;
            finalTriggered = false;
            if (failsafeTimer) clearTimeout(failsafeTimer);
            
            micContainer.classList.add('hidden');
            sendToArduino("X"); 
            sendToArduino("R"); 
            
            statusText.innerText = reason || "Try again";
            mainDisplay.classList.add('glow-red');
            speak("Try again.");
        }

        recognition.onend = () => {
            // If the mic closed but we didn't trigger success, it's a fail/timeout
            if (isListening && !finalTriggered) {
                handleNoMatch("I didn't hear that.");
            }
            isListening = false;
            micContainer.classList.add('hidden');
        };

        recognition.onerror = (event) => {
            console.error("Speech Error:", event.error);
            if (event.error === 'no-speech') {
                handleNoMatch("Silent...");
            } else if (event.error !== 'aborted') {
                handleNoMatch("Mic Error");
            }
        };

        function speak(text) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
        }

        async function sendToArduino(str) {
            if (btChar) {
                try {
                    await btChar.writeValue(new TextEncoder().encode(str));
                } catch (e) { console.log("BT Error"); }
            }
        }
    </script>
</body>
</html>
