<!DOCTYPE html>
<html>
<head>
    <title>AI Buddy AIO 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        #word { font-size: 70px; font-weight: bold; margin: 20px 0; color: #4db8ff; }
        #status { font-size: 24px; color: #aaaaaa; }
        .btn { background: #007bff; border: none; color: white; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; }
        .indicator { width: 100px; height: 100px; border-radius: 50%; margin: 20px auto; border: 5px solid #333; }
        .listening { background: #ffcc00; box-shadow: 0 0 20px #ffcc00; }
        .correct { background: #28a745; }
        .wrong { background: #dc3545; }
    </style>
</head>
<body>

    <h1>AI Pronunciation Buddy</h1>
    <button id="connectBtn" class="btn">1. CONNECT TO ARDUINO</button>
    
    <div id="word">READY</div>
    <div id="status">Waiting for Bluetooth...</div>
    <div id="indicator" class="indicator"></div>

    <script>
        let btDevice, btChar;
        const words = ["APPLE", "BANANA", "ORANGE", "CHERRY", "GRAPE"];
        let index = -1;

        const connectBtn = document.getElementById('connectBtn');
        const wordDisp = document.getElementById('word');
        const statusDisp = document.getElementById('status');
        const indicator = document.getElementById('indicator');

        // Speech Engine
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';

        connectBtn.onclick = async () => {
            try {
                btDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['00001101-0000-1000-8000-00805f9b34fb'] }],
                    optionalServices: ['00001101-0000-1000-8000-00805f9b34fb']
                });
                const server = await btDevice.gatt.connect();
                const service = await server.getPrimaryService('00001101-0000-1000-8000-00805f9b34fb');
                btChar = await service.getCharacteristic('00001101-0000-1000-8000-00805f9b34fb');
                
                await btChar.startNotifications();
                btChar.addEventListener('characteristicvaluechanged', handleData);
                
                statusDisp.innerText = "Connected! Press NEXT on Arduino.";
                connectBtn.style.display = 'none';
            } catch (err) { alert("Error: " + err); }
        };

        function handleData(event) {
            const cmd = new TextDecoder().decode(event.target.value).trim();
            if (cmd.includes("NEXT")) {
                index = (index + 1) % words.length;
                startRound();
            }
        }

        function startRound() {
            const target = words[index];
            wordDisp.innerText = target;
            statusDisp.innerText = "Listen...";
            speak("The word is " + target);
            
            setTimeout(() => {
                statusDisp.innerText = "SPEAK NOW!";
                indicator.className = "indicator listening";
                sendToArduino("L"); // Yellow On
                recognition.start();
            }, 2000);
        }

        recognition.onresult = (event) => {
            const heard = event.results[0][0].transcript.toUpperCase();
            sendToArduino("X"); // Yellow Off
            
            if (heard.includes(words[index])) {
                statusDisp.innerText = "CORRECT!";
                indicator.className = "indicator correct";
                sendToArduino("G"); // Green
                speak("Correct!");
            } else {
                statusDisp.innerText = "WRONG! Heard: " + heard;
                indicator.className = "indicator wrong";
                sendToArduino("R"); // Red
                speak("Try again.");
            }
        };

        async function sendToArduino(msg) {
            if (btChar) await btChar.writeValue(new TextEncoder().encode(msg));
        }

        function speak(txt) {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(txt));
        }
    </script>
</body>
</html>
