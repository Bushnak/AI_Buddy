<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Buddy Pro | AIO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #020617; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-green { box-shadow: 0 0 40px rgba(34, 197, 94, 0.4); border-color: #22c55e; }
        .glow-red { box-shadow: 0 0 40px rgba(239, 68, 68, 0.4); border-color: #ef4444; }
        .mic-active { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md glass rounded-[3rem] p-10 shadow-2xl relative overflow-hidden text-center border border-white/5">
        <header class="mb-10">
            <h1 class="text-blue-500 text-xs font-bold uppercase tracking-[0.4em] mb-2">Smart Education 2026</h1>
            <div class="text-4xl font-black text-white tracking-tighter">AI BUDDY <span class="text-blue-500">PRO</span></div>
        </header>

        <div id="mainDisplay" class="bg-slate-900/80 rounded-[2rem] p-12 text-center border border-slate-700/50 mb-10 transition-all duration-500">
            <div id="statusText" class="text-blue-400 text-xs font-bold mb-4 uppercase tracking-widest">System Offline</div>
            <div id="wordDisplay" class="text-6xl font-black text-white tracking-tighter opacity-20 transition-all duration-500">READY</div>
            <div id="liveFeedback" class="text-[11px] text-slate-500 mt-4 h-5 font-medium tracking-wide"></div>
        </div>

        <div id="controlPanel">
            <button id="btnConnect" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-6 rounded-2xl transition-all shadow-xl shadow-blue-900/30 active:scale-95 flex items-center justify-center gap-3 text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.636 18.364a9 9 0 010-12.728m12.728 0a9 9 0 010 12.728m-9.9-2.828a5 5 0 010-7.07m7.072 0a5 5 0 010 7.07M13 12a1 1 0 11-2 0 1 1 0 012 0z" />
                </svg>
                PAIR WITH JDY-33
            </button>
        </div>

        <div id="micContainer" class="hidden flex flex-col items-center mt-2">
            <div id="micCircle" class="w-20 h-20 bg-red-500 rounded-full flex items-center justify-center mic-active mb-5 shadow-lg shadow-red-900/40">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m8 0h-8m4-14a3 3 0 00-3 3v5a3 3 0 006 0V5a3 3 0 00-3-3z" />
                </svg>
            </div>
            <span class="text-red-500 text-xs font-bold uppercase tracking-widest mb-6">Listening for Voice...</span>
            <button id="btnAbort" class="text-slate-500 text-[10px] underline uppercase tracking-[0.2em] hover:text-white transition-colors">Emergency Reset</button>
        </div>
        
        <footer class="mt-10 pt-6 border-t border-white/5">
            <p class="text-slate-500 text-[10px] uppercase tracking-widest">Hardware Synced via WebBluetooth</p>
        </footer>
    </div>

    <script>
        const SERVICE_UUID = '0000ffe0-0000-1000-8000-00805f9b34fb';
        const CHAR_UUID = '0000ffe1-0000-1000-8000-00805f9b34fb';
        
        let btChar;
        const words = ["APPLE", "BANANA", "ORANGE", "CHERRY", "COMPUTER"];
        let currentIndex = 0;
        let isListening = false;
        let failsafeTimer = null;
        let finalTriggered = false;

        const btnConnect = document.getElementById('btnConnect');
        const statusText = document.getElementById('statusText');
        const wordDisplay = document.getElementById('wordDisplay');
        const micContainer = document.getElementById('micContainer');
        const mainDisplay = document.getElementById('mainDisplay');
        const btnAbort = document.getElementById('btnAbort');
        const liveFeedback = document.getElementById('liveFeedback');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            statusText.innerText = "Error: Browser Incompatible";
            btnConnect.disabled = true;
        }
        
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = false;
        recognition.interimResults = true; 
        recognition.maxAlternatives = 1;

        btnConnect.onclick = async () => {
            try {
                statusText.innerText = "Requesting Access...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'JDY' }, { namePrefix: 'HC' }],
                    optionalServices: [SERVICE_UUID]
                });
                
                statusText.innerText = "Pairing Brain...";
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                btChar = await service.getCharacteristic(CHAR_UUID);

                await btChar.startNotifications();
                btChar.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value).trim();
                    console.log("From Arduino:", val);
                    if(val.includes("NEXT")) startRound();
                });

                statusText.innerText = "System Online";
                btnConnect.parentElement.classList.add('hidden');
                wordDisplay.classList.remove('opacity-20');
                speak("Connection established. Ready for hardware triggers.");
            } catch (err) {
                statusText.innerText = "Connection Failed";
                console.error(err);
            }
        };

        btnAbort.onclick = () => {
            recognition.abort();
            handleNoMatch("User Aborted");
        };

        function startRound() {
            finalTriggered = false;
            isListening = false;
            if (failsafeTimer) clearTimeout(failsafeTimer);
            try { recognition.abort(); } catch(e) {} 

            const target = words[currentIndex];
            currentIndex = (currentIndex + 1) % words.length;
            
            wordDisplay.innerText = target;
            wordDisplay.classList.add('scale-110');
            setTimeout(() => wordDisplay.classList.remove('scale-110'), 300);
            
            liveFeedback.innerText = "Waiting for audio...";
            mainDisplay.classList.remove('glow-green', 'glow-red');
            
            statusText.innerText = "Processing Target...";
            speak("The word is " + target + ". Say it now.");
            
            sendToArduino("L"); 

            setTimeout(() => {
                try {
                    isListening = true;
                    micContainer.classList.remove('hidden');
                    statusText.innerText = "Mic Active";
                    recognition.start();

                    failsafeTimer = setTimeout(() => {
                        if (isListening) recognition.stop();
                    }, 10000); 

                } catch(e) {
                    isListening = false;
                    micContainer.classList.add('hidden');
                }
            }, 2500);
        }

        recognition.onresult = (event) => {
            if (finalTriggered) return;

            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                transcript += event.results[i][0].transcript.toUpperCase();
            }

            liveFeedback.innerText = "Detecting: " + transcript;
            
            if (transcript.includes(wordDisplay.innerText)) {
                finalTriggered = true;
                success();
            }
        };

        function success() {
            isListening = false;
            if (failsafeTimer) clearTimeout(failsafeTimer);
            recognition.stop();
            
            micContainer.classList.add('hidden');
            sendToArduino("X"); 
            sendToArduino("G"); 

            statusText.innerText = "Matched Successfully";
            mainDisplay.classList.add('glow-green');
            speak("Excellent pronunciation!");
        }

        function handleNoMatch(reason) {
            isListening = false;
            finalTriggered = false;
            if (failsafeTimer) clearTimeout(failsafeTimer);
            
            micContainer.classList.add('hidden');
            sendToArduino("X"); 
            sendToArduino("R"); 
            
            statusText.innerText = "Match Failed";
            mainDisplay.classList.add('glow-red');
            speak("That's not quite right. Listen again.");
        }

        recognition.onend = () => {
            if (isListening && !finalTriggered) {
                handleNoMatch("No Input Detected");
            }
            isListening = false;
            micContainer.classList.add('hidden');
        };

        function speak(text) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        async function sendToArduino(str) {
            if (btChar) {
                try {
                    await btChar.writeValue(new TextEncoder().encode(str));
                } catch (e) { console.warn("BT Write Blocked"); }
            }
        }
    </script>
</body>
</html>
