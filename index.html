<!DOCTYPE html>
<html>
<head>
    <title>AIO 2026 AI Buddy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #word { font-size: 60px; font-weight: 800; color: #38bdf8; margin: 20px 0; }
        .btn { background: #0ea5e9; color: white; border: none; padding: 15px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #status { color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>AI Buddy</h1>
        <button id="connect" class="btn">CONNECT ARDUINO</button>
        <div id="word">READY</div>
        <p id="status">Status: Disconnected</p>
    </div>

    <script>
        let port, reader, inputDone, outputDone;
        const words = ["APPLE", "BANANA", "ORANGE", "COMPUTER"];
        let idx = -1;

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';

        document.getElementById('connect').onclick = async () => {
            try {
                // Request Bluetooth Device
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['00001101-0000-1000-8000-00805f9b34fb'] }],
                    optionalServices: ['00001101-0000-1000-8000-00805f9b34fb']
                });
                
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('00001101-0000-1000-8000-00805f9b34fb');
                const char = await service.getCharacteristic('00001101-0000-1000-8000-00805f9b34fb');

                document.getElementById('status').innerText = "Connected to HC-05!";
                
                // Listen for "NEXT" from Arduino
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (event) => {
                    const val = new TextDecoder().decode(event.target.value);
                    if(val.includes("NEXT")) {
                        idx = (idx + 1) % words.length;
                        startAI(char);
                    }
                });
            } catch (e) { alert("Error: " + e); }
        };

        async function startAI(char) {
            const target = words[idx];
            document.getElementById('word').innerText = target;
            
            // Speak Word
            const msg = new SpeechSynthesisUtterance("The word is " + target);
            window.speechSynthesis.speak(msg);

            // Signal Arduino: Yellow LED ON
            await char.writeValue(new TextEncoder().encode("L"));

            setTimeout(() => {
                recognition.start();
            }, 1500);

            recognition.onresult = async (event) => {
                const result = event.results[0][0].transcript.toUpperCase();
                await char.writeValue(new TextEncoder().encode("X")); // Yellow OFF

                if(result.includes(target)) {
                    document.getElementById('status').innerText = "Correct!";
                    await char.writeValue(new TextEncoder().encode("G")); // Green
                } else {
                    document.getElementById('status').innerText = "Wrong: " + result;
                    await char.writeValue(new TextEncoder().encode("R")); // Red
                }
            };
        }
    </script>
</body>
</html>
